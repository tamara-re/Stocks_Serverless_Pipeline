<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Top Movers</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #fff;
      color: #111;
      padding: 48px 24px;
      max-width: 640px;
      margin: 0 auto;
    }

    h1 {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      color: #999;
      margin-bottom: 32px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th {
      text-align: left;
      font-size: 11px;
      font-weight: 500;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0 0 12px 0;
      border-bottom: 1px solid #eee;
    }

    td {
      padding: 14px 0;
      border-bottom: 1px solid #eee;
      vertical-align: middle;
    }

    .ticker { font-weight: 500; }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 6px;
      font-weight: 600; 
      font-size: 13px;
      min-width: 70px;
      text-align: center;
    }

    .gain { 
      background-color: #a9dba9; 
      color: #1e4620; 
    }

    .loss { 
      background-color: #ed9593; 
      color: #5c1a19; 
    }

    .loading, .error {
      font-size: 13px;
      color: #999;
      padding: 32px 0;
    }

    .error { color: #dc2626; }
  </style>
</head>
<body>
  <h1>Top Movers</h1>
  <p class="subtitle">Biggest daily % mover from stock watchlist — last 7 trading days</p>

  <table>
    <thead>
      <tr>
        <th>Ticker</th>
        <th>Date</th>
        <th>Close</th>
        <th>Change</th>
      </tr>
    </thead>
    <tbody id="tbody">
      <tr><td colspan="4" class="loading">Loading...</td></tr>
    </tbody>
  </table>

  <script>
    const API_URL = "${api_url}";

    async function load() {
      const tbody = document.getElementById("tbody");
      try {
        const res = await fetch(API_URL);
         if (!res.ok) {
          throw new Error(`Unable to load data (Status: ${res.status})`);
        }
        const data = await res.json();

        if (!data || !data.length) {
          tbody.innerHTML = `<tr><td colspan="4" class="loading">No data yet.</td></tr>`;
          return;
        }

        tbody.innerHTML = data.map(row => {
          const pct = parseFloat(row.pct_change || 0);

          const price = parseFloat(row.close_price || 0);

          const sign = pct >= 0 ? "+" : "";
          const cls  = pct >= 0 ? "gain" : "loss";
          return '<tr>' +
            '<td class="ticker">' + (row.ticker_symbol || '---') + '</td>' +
            '<td>' + (row.date || '---') + '</td>' +
            '<td>$' + price.toFixed(2) + '</td>' +
            '<td><span class="badge ' + cls + '">' + sign + pct.toFixed(2) + '%</span></td>' +
            '</tr>';
        }).join("");
      } catch (err) {
        let displayError = err.message;

        if (err.message === "Failed to get data") {

          displayError = "Network error";

        }

        tbody.innerHTML = '<tr><td colspan="4" class="status-msg error-msg">' + displayError + '</td></tr>';

        console.error("Fetch Error:", err);;
      }
    }

    load();
  </script>
</body>
</html>
